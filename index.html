<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackle — Controla tus suscripciones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #F2F1EE;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
        }
        .logo-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #7B61FF, #5B3CC4);
            border-radius: 20px;
            display: inline-flex;
            align-items: center; justify-content: center;
            color: white; font-size: 36px; font-weight: 700;
            margin-bottom: 24px;
            box-shadow: 0 8px 30px rgba(123,97,255,0.3);
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .badge {
            display: inline-block;
            margin-bottom: 32px;
        }
        .badge img {
            height: 54px;
        }
        .links {
            display: flex;
            gap: 24px;
            justify-content: center;
            font-size: 14px;
        }
        .links a {
            color: #999;
            text-decoration: none;
        }
        .links a:hover {
            color: #7B61FF;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-icon">T</div>
        <h1>Trackle</h1>
        <p>Controla tus suscripciones, analiza tus gastos y ahorra cada mes.</p>
        <div class="badge">
            <a href="https://apps.apple.com/app/id6745257638" target="_blank">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Descargar en el App Store">
            </a>
        </div>
        <div class="links">
            <a href="./privacy/">Política de privacidad</a>
            <a href="./terms/">Términos de uso</a>
        </div>
    </div>
</body>
</html>
